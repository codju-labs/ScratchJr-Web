<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:xlink="http://www.w3.org/1999/xlink">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta http-equiv="cache-control" content="no-cache">
<meta charset="utf-8">

<head>
<title>ScratchJr</title>

<script>
    window.scratchJrPage = 'editor';

    // Read initial project data from URL hash
    if (window.location.hash && window.location.hash.length > 1) {
      try {
        window.savedContent = decodeURIComponent(window.location.hash.substring(1));
      } catch (e) {}
    }

    // Support postMessage for loading data after init
    window.addEventListener("message", function (e) {
      if (e.data && e.data.type === "LOAD_DATA") {
        window.__scratchJrLoadData = e.data.data;
        if (window.__scratchJrReady && window.__loadExternalProject) {
          window.__loadExternalProject(e.data.data);
        }
      }
    });
</script>
<script src='../electronClient.js'></script>
<script type="text/javascript" src="appEntry.js"></script>
</head>
<body style="background: white;">
<div class="frame" id="frame"></div>
<div class="libframe" id="libframe"></div>
<div class="paintframe" id="paintframe"></div>

</body>
</html>

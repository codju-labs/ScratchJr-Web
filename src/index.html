<!DOCTYPE html>
<html
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:xlink="http://www.w3.org/1999/xlink"
>
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta http-equiv="cache-control" content="no-cache" />
  <meta charset="utf-8" />

  <head>
    <title>ScratchJr</title>

    <script>
      window.scratchJrPage = "editor";

      // Read initial project data from URL hash (avoids URL length limits of query params)
      // Parent sets: iframe.src = "index.html#" + encodeURIComponent(jsonString)
      if (window.location.hash && window.location.hash.length > 1) {
        try {
          window.savedContent = decodeURIComponent(window.location.hash.substring(1));
        } catch (e) {
          // If decode fails, ignore
        }
      }

      // Also support postMessage for loading data after init
      window.addEventListener("message", function (e) {
        if (e.data && e.data.type === "LOAD_DATA") {
          window.__scratchJrLoadData = e.data.data;
          if (window.__scratchJrReady && window.__loadExternalProject) {
            window.__loadExternalProject(e.data.data);
          }
        }
      });
    </script>
  </head>
  <body style="background: white; overflow: auto">
    <div class="frame" id="frame"></div>
    <div class="libframe" id="libframe"></div>
    <div class="paintframe" id="paintframe"></div>
  </body>
</html>
